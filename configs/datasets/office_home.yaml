INPUT:
  SIZE: (224, 224)
  TRANSFORMS: ["random_flip", "center_crop", "normalize"]

DATASET:
  NAME: "OfficeHome"
  SOURCE_DOMAINS: ["real_world"]
  # TARGET_DOMAINS: ["art"]
  TARGET_DOMAINS: ["clipart"]
  # TARGET_DOMAINS: ["product"]
  # TARGET_DOMAINS: ["real_world"]
#  K: 65
# you can modify the code to explore four domains

TRAINER:
  MODEL:
    STRONG_TRANSFORMS: ["random_flip", "randaugment", "normalize"]
    # Strong Augment which may need to compare different styles(e.g. CLIP Style and CoOp Style)

MODEL:
  BACKBONE:
    NAME: "RN50"
    PATH: "pretrain_model/"